<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">

<title>MilestoneFlow 低保真原型 V1.0</title>
<style>
:root{--bg:#f3f4f6;--panel:#fff;--line:#d7dbe0;--text:#20242a;--muted:#68717d;--dark:#262b31;--danger:#8b3434;--warn:#7b5b17;--ok:#326344;--radius:12px}*{box-sizing:border-box}body{margin:0;font:14px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang TC","Microsoft JhengHei",sans-serif;background:var(--bg);color:var(--text)}button,input,textarea,select{font:inherit}button{cursor:pointer}.app{min-height:100vh}.side{position:fixed;inset:0 auto 0 0;width:240px;background:#eceef1;border-right:1px solid var(--line);padding:20px 14px;z-index:20}.brand{display:flex;gap:10px;align-items:center;padding:0 6px 20px;border-bottom:1px solid var(--line)}.logo{width:42px;height:42px;border:2px solid var(--dark);border-radius:8px;display:grid;place-items:center;font-weight:800;background:white}.brand strong,.brand small{display:block}.brand small{color:var(--muted)}nav{display:grid;gap:5px;padding-top:18px}.nav{border:0;background:transparent;text-align:left;padding:11px 13px;border-radius:8px}.nav:hover,.nav.on{background:white;box-shadow:inset 3px 0 var(--dark)}.side-note{position:absolute;left:14px;right:14px;bottom:18px;border:1px dashed #adb4bd;border-radius:9px;padding:12px;color:var(--muted);font-size:12px}.main{margin-left:240px}.top{position:sticky;top:0;z-index:15;background:rgba(255,255,255,.94);border-bottom:1px solid var(--line);min-height:84px;padding:16px 26px;display:flex;align-items:center;justify-content:space-between}.top h1{margin:0;font-size:23px}.top p{margin:2px 0 0;color:var(--muted)}.actions{display:flex;gap:9px}.view{padding:22px 26px 48px;max-width:1500px;margin:auto}.grid{display:grid;gap:18px}.stats{grid-template-columns:repeat(4,1fr)}.stat,.panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:0 2px 7px #0000000a}.stat{padding:17px;display:grid;gap:4px}.stat strong{font-size:25px}.stat span,.stat small{color:var(--muted)}.stat.danger{border-left:4px solid var(--danger)}.click{cursor:pointer}.click:hover{border-color:#aab1ba;transform:translateY(-1px)}.two{grid-template-columns:1.25fr 1fr}.head{padding:16px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:12px}.head h2{margin:0;font-size:18px}.head p{margin:2px 0 0;color:var(--muted);font-size:12px}.task{width:100%;border:0;border-bottom:1px solid var(--line);background:white;padding:13px 18px;display:grid;grid-template-columns:36px 1fr auto;align-items:center;gap:11px;text-align:left}.task:last-child{border-bottom:0}.task:hover{background:#f8f9fa}.ico{width:32px;height:32px;border:1px solid #adb4bd;border-radius:50%;display:grid;place-items:center;font-weight:700}.task strong,.task small{display:block}.task small{color:var(--muted)}.badge{display:inline-flex;width:max-content;border:1px solid #aeb5bd;background:#f3f4f5;color:#4d555f;padding:3px 9px;border-radius:99px;font-size:12px}.badge.warn{color:var(--warn);border-color:#c5a75c;background:#faf5e8}.badge.danger{color:var(--danger);border-color:#c78888;background:#fbeeee}.badge.ok{color:var(--ok);border-color:#7fab8b;background:#edf7ef}.quick{padding:14px;grid-template-columns:1fr 1fr}.quick button{border:1px dashed #adb4bd;background:#f8f9fa;border-radius:9px;padding:14px;text-align:left}.quick button:hover{background:white;border-style:solid}.quick strong,.quick small{display:block}.quick small{color:var(--muted)}.timeline{padding:8px 18px 16px}.event{display:grid;grid-template-columns:15px 1fr;gap:9px;padding:10px 0}.dot{width:10px;height:10px;border-radius:50%;background:var(--dark);margin-top:5px}.event strong,.event small{display:block}.event small{color:var(--muted)}.btn{border:1px solid var(--dark);border-radius:8px;padding:9px 13px;font-weight:650}.primary{background:var(--dark);color:white}.secondary{background:white;color:var(--text);border-color:#aeb5bd}.ghost-danger{background:white;color:var(--danger);border-color:#b87575}.full{width:100%}.filters{padding:13px 18px;display:flex;gap:9px;border-bottom:1px solid var(--line)}input,textarea,select{width:100%;border:1px solid #adb4bd;border-radius:8px;padding:9px 10px;background:white;color:var(--text)}textarea{resize:vertical}label{display:grid;gap:5px;font-weight:650}.filters input{flex:1}.table{overflow:auto}table{width:100%;border-collapse:collapse}th,td{padding:12px 18px;text-align:left;border-bottom:1px solid var(--line);white-space:nowrap}th{background:#f8f9fa;color:var(--muted);font-size:12px}td strong,td small{display:block}td small{color:var(--muted)}tr.click:hover{background:#f8f9fa}.project-head{padding:18px;display:flex;justify-content:space-between;gap:16px}.project-head h2{margin:5px 0 2px}.project-head p{margin:0;color:var(--muted)}.money{display:flex;gap:23px;text-align:right;align-items:center}.money span,.money strong{display:block}.money span{font-size:11px;color:var(--muted)}.crumb{font-size:12px;color:var(--muted)}.linkbtn{border:0;background:transparent;padding:0;text-decoration:underline;color:var(--muted)}.tabs{display:flex;overflow:auto;border-bottom:1px solid var(--line)}.tab{border:0;background:transparent;padding:11px 13px;border-bottom:3px solid transparent;white-space:nowrap}.tab.on{border-color:var(--dark);font-weight:750}.baseline{grid-template-columns:2fr 1fr}.section{padding:17px 18px;border-bottom:1px solid var(--line)}.section:last-child{border-bottom:0}.section h3{margin:0 0 8px}.summary{padding:14px;display:grid;gap:9px}.summary div{border:1px solid var(--line);border-radius:8px;background:#f8f9fa;padding:11px}.summary span,.summary strong{display:block}.summary span{font-size:11px;color:var(--muted)}.editor{grid-template-columns:minmax(0,1.45fr) minmax(310px,.65fr);align-items:start}.form{padding:18px;display:grid;gap:16px}fieldset{border:1px solid var(--line);border-radius:10px;padding:15px;display:grid;gap:11px}legend{font-weight:800;padding:0 6px}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.help{font-size:12px;color:var(--muted);background:#f8f9fa;border-left:3px solid #adb4bd;padding:9px}.items{display:grid;gap:7px}.item{display:grid;grid-template-columns:1fr 36px;gap:7px}.x{border:1px solid #adb4bd;border-radius:8px;background:white}.payrow{display:grid;grid-template-columns:1fr 65px 20px 115px;gap:7px;align-items:center}.payrow strong{text-align:right}.total{display:flex;justify-content:space-between;border-top:1px solid var(--line);padding-top:10px;font-size:18px}.form-actions{display:flex;justify-content:flex-end;gap:9px}.preview{position:sticky;top:102px}.doc{padding:20px}.doc h3{font-size:21px;margin-bottom:2px}.doc h4{margin:18px 0 7px}.price{font-size:27px;font-weight:800}.public{min-height:100vh;background:#eceef1;padding:24px 14px 38px}.public-header,.public-card,.public-footer{max-width:770px;margin-left:auto;margin-right:auto}.public-header{display:flex;gap:10px;align-items:center;margin-bottom:14px}.public-card{background:white;border:1px solid var(--line);border-radius:14px;padding:26px}.public-card h1{margin:14px 0 5px}.lead{color:var(--muted)}.public-status{display:flex;justify-content:space-between;color:var(--muted);font-size:12px}.box,.impact{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;border:1px solid var(--line);border-radius:9px;background:#f8f9fa;padding:14px;margin:20px 0}.box span,.box strong,.impact span,.impact strong{display:block}.box span,.impact span{font-size:11px;color:var(--muted)}.public-section{padding:16px 0;border-top:1px solid var(--line)}.public-section h2{font-size:17px;margin:0 0 10px}.check li::marker{content:"✓  "}.cross li::marker{content:"—  "}.public-table{border:1px solid var(--line);border-radius:8px;overflow:hidden}.public-table div{display:grid;grid-template-columns:1fr 90px 120px;padding:9px 11px;border-bottom:1px solid var(--line)}.public-table div:last-child{border-bottom:0}.public-table strong{text-align:right}.checkbox{grid-template-columns:20px 1fr;align-items:start;font-weight:500}.checkbox input{width:auto;margin-top:4px}.public-actions{display:flex;justify-content:flex-end;gap:9px;padding-top:18px;border-top:1px solid var(--line)}.public-footer{text-align:center;color:var(--muted);font-size:12px;margin-top:12px}.upload{border:2px dashed #adb4bd;border-radius:9px;background:#f8f9fa;padding:24px;text-align:center}.versions{padding:13px;display:grid;gap:9px}.version{border:1px solid var(--line);border-radius:8px;padding:11px}.version.current{border:2px solid var(--dark)}.version div{display:flex;justify-content:space-between}.version p{margin:4px 0}.version small{color:var(--muted)}.file{display:grid;grid-template-columns:38px 1fr;gap:9px;border:1px solid var(--line);border-radius:8px;padding:10px;margin-bottom:7px}.file i{width:34px;height:34px;border:1px solid #adb4bd;border-radius:6px;display:grid;place-items:center;font-style:normal}.file strong,.file small{display:block}.file small{color:var(--muted)}.compare{grid-template-columns:1fr 1fr}.compare div{border:1px solid var(--line);border-radius:8px;background:#f8f9fa;padding:12px}.highlight{font-weight:800;text-decoration:underline}.kanban{display:grid;grid-template-columns:repeat(4,minmax(245px,1fr));gap:12px;padding:14px;overflow:auto}.col{background:#f8f9fa;border:1px solid var(--line);border-radius:9px;min-height:380px;padding:9px}.col header{display:flex;justify-content:space-between;padding:4px 2px 10px}.card{background:white;border:1px solid var(--line);border-radius:8px;padding:12px;margin-bottom:9px}.card h3{font-size:15px;margin:8px 0 1px}.card p{margin:0;color:var(--muted)}.card small{color:var(--muted)}.card-top,.meta{display:flex;justify-content:space-between;gap:7px}.meta{font-size:11px;color:var(--muted);margin-top:8px}.progress{height:7px;background:#e0e3e6;border-radius:99px;overflow:hidden;margin-top:8px}.progress span{display:block;height:100%;background:var(--dark)}.empty{min-height:360px;display:grid;place-items:center;align-content:center;text-align:center;padding:35px}.modal-bg{position:fixed;inset:0;background:#15191f88;z-index:100;display:grid;place-items:center;padding:14px}.modal{width:min(540px,100%);background:white;border-radius:12px}.modal header,.modal footer{padding:15px 17px}.modal header{border-bottom:1px solid var(--line)}.modal footer{border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:8px}.modal h2{margin:0;font-size:18px}.modal-body{padding:17px}.toast{position:fixed;right:20px;bottom:20px;background:var(--dark);color:white;padding:10px 14px;border-radius:8px;z-index:200;opacity:0;transform:translateY(8px);transition:.2s;pointer-events:none}.toast.on{opacity:1;transform:none}.mobile{display:none;border:0;background:transparent;font-size:21px}
@media(max-width:1050px){.stats{grid-template-columns:repeat(2,1fr)}.editor{grid-template-columns:1fr}.preview{position:static}.baseline{grid-template-columns:1fr}}
@media(max-width:820px){.side{transform:translateX(-100%);transition:.2s}.side.open{transform:none}.main{margin-left:0}.mobile{display:block}.top{padding:13px 15px}.top .secondary{display:none}.view{padding:15px}.two{grid-template-columns:1fr}.project-head{display:grid}.money{text-align:left;justify-content:space-between}.kanban{grid-template-columns:repeat(4,265px)}}
@media(max-width:560px){.stats,.quick,.row,.compare{grid-template-columns:1fr}.public-card{padding:19px 15px}.box,.impact{grid-template-columns:1fr}.public-actions{display:grid}.public-table div{grid-template-columns:1fr 70px 100px;font-size:12px}.payrow{grid-template-columns:1fr 55px 18px 95px;font-size:12px}}
</style>
</head>
<body>
<div id="toast" class="toast"></div>
<div class="app">
<aside class="side"><div class="brand"><div class="logo">MF</div><div><strong>MilestoneFlow</strong><small>低保真原型 V1.0</small></div></div><nav><button class="nav on" data-route="dashboard">工作台</button><button class="nav" data-route="projects">项目</button><button class="nav" data-route="receivables">应收款</button><button class="nav" data-route="placeholder">模板</button><button class="nav" data-route="placeholder">设置</button></nav><div class="side-note"><strong>演示数据</strong><br>本原型重点验证范围、验收、变更和应收，不代表最终视觉设计。</div></aside>
<main class="main"><header class="top"><button class="mobile" id="mobile">☰</button><div><h1 id="title">工作台</h1><p id="sub">查看待确认、待验收和待回款事项</p></div><div class="actions"><button class="btn secondary" data-action="guide">原型说明</button><button class="btn primary" data-route="quote-editor">＋ 新建报价</button></div></header><section id="view" class="view"></section></main>
</div><div id="modal"></div>
<script>
const meta={dashboard:['工作台','查看待确认、待验收和待回款事项'],projects:['项目','管理当前商业基线与下一动作'],'project':['餐厅官网开发','范围、交付、变更和应收'],'quote-editor':['报价编辑','定义范围、非范围、验收和付款计划'],'quote-public':['客户报价确认','客户无需注册即可操作'],'delivery':['提交交付','建立不可变交付版本'],'acceptance':['客户验收','针对具体交付版本做出结论'],'change-editor':['需求变更','确认新增范围、费用和工期'],'change-public':['客户变更确认','确认前不改变商业基线'],receivables:['应收款','追踪待付款、部分付款、逾期和已付款'],placeholder:['暂未设计','不属于本轮核心验证']};
let route='dashboard',projectTab='baseline';const v=document.getElementById('view'),title=document.getElementById('title'),sub=document.getElementById('sub');
const btn=(t,r,c='btn secondary')=>`<button class="${c}" data-route="${r}">${t}</button>`;
function dashboard(){return `<div class="grid"><section class="grid stats"><article class="stat click" data-route="projects"><span>进行中项目</span><strong>4</strong><small>2 个等待客户操作</small></article><article class="stat click" data-route="receivables"><span>待收金额</span><strong>NT$92,000</strong><small>3 笔应收</small></article><article class="stat danger click" data-route="receivables"><span>已逾期</span><strong>NT$28,000</strong><small>最久 8 天</small></article><article class="stat click" data-route="project"><span>本周待验收</span><strong>2</strong><small>餐厅官网、品牌视觉</small></article></section><div class="grid two"><section class="panel"><div class="head"><div><h2>今天最重要</h2><p>按商业影响排序</p></div></div><button class="task" data-route="change-editor"><span class="ico">变</span><span><strong>确认会员积分新增需求</strong><small>可能增加 NT$30,000 / 7 天</small></span><span class="badge warn">待处理</span></button><button class="task" data-route="acceptance"><span class="ico">验</span><span><strong>设计稿 V2 等待客户验收</strong><small>已等待 2 天</small></span><span class="badge">待客户</span></button><button class="task" data-route="receivables"><span class="ico">款</span><span><strong>尾款已逾期 8 天</strong><small>品牌视觉升级 · NT$28,000</small></span><span class="badge danger">已逾期</span></button></section><section class="panel"><div class="head"><div><h2>快速开始</h2><p>从最常见任务进入</p></div></div><div class="grid quick"><button data-route="quote-editor"><strong>创建报价</strong><small>定义范围、非范围与付款节点</small></button><button data-route="delivery"><strong>提交交付</strong><small>建立版本并请求验收</small></button><button data-route="change-editor"><strong>创建变更单</strong><small>先确认费用和工期</small></button><button data-route="receivables"><strong>记录收款</strong><small>更新付款状态</small></button></div></section></div><section class="panel"><div class="head"><div><h2>最近客户动作</h2><p>关键确认和查看记录</p></div>${btn('查看项目时间线','project')}</div><div class="timeline"><div class="event"><span class="dot"></span><div><strong>客户查看了设计稿 V2</strong><small>17 分钟前</small></div></div><div class="event"><span class="dot"></span><div><strong>客户确认报价 V1</strong><small>昨天 14:32</small></div></div><div class="event"><span class="dot"></span><div><strong>发送逾期提醒</strong><small>昨天 09:00</small></div></div></div></section></div>`}
function projects(){return `<section class="panel"><div class="head"><div><h2>项目</h2><p>优先显示需要确认或影响回款的事项</p></div>${btn('＋ 新建项目','quote-editor','btn primary')}</div><div class="filters"><input placeholder="搜索项目或客户"><select><option>全部状态</option><option>待验收</option><option>已逾期</option></select></div><div class="table"><table><thead><tr><th>项目</th><th>当前商业基线</th><th>下一动作</th><th>已收 / 总额</th><th>状态</th></tr></thead><tbody><tr class="click" data-route="project"><td><strong>餐厅官网开发</strong><small>森日餐饮</small></td><td>报价 V1 + CR-001 草稿</td><td>客户验收设计稿 V2</td><td>36,000 / 120,000</td><td><span class="badge warn">待验收</span></td></tr><tr><td><strong>品牌视觉升级</strong><small>岛屿咖啡</small></td><td>报价 V2</td><td>催收尾款</td><td>42,000 / 70,000</td><td><span class="badge danger">已逾期</span></td></tr><tr><td><strong>预约小程序</strong><small>青屿摄影</small></td><td>报价 V1</td><td>提交第一阶段</td><td>20,000 / 80,000</td><td><span class="badge">执行中</span></td></tr></tbody></table></div></section>`}

tton class="btn secondary full" data-action="payment">记录付款</button>')}</section><section class="col"><header><strong>已付款</strong><span>2</span></header>${card('已付款','ok','NT$36,000','餐厅官网启动款','森日餐饮','06-02 已记录','<span>银行转账</span><span>完成</span>','')}${card('已付款','ok','NT$45,000','顾问网站全款','林顾问','05-20 已记录','<span>银行转账</span><span>完成</span>','')}</section></div></section></div>`}
function placeholder(){return `<section class="panel empty"><h2>该页面不属于本轮核心验证</h2><p>V1.0 只验证报价、交付验收、需求变更和应收流程。</p>${btn('返回工作台','dashboard','btn primary')}</section>`}
function render(){title.textContent=meta[route][0];sub.textContent=meta[route][1];document.querySelectorAll('.nav').forEach(x=>x.classList.toggle('on',x.dataset.route===route));const map={dashboard,projects,project,'quote-editor':quoteEditor,'quote-public':()=>publicShell('quote'),delivery,acceptance:()=>publicShell('accept'),'change-editor':changeEditor,'change-public':()=>publicShell('change'),receivables,placeholder};v.innerHTML=map[route]();if(route==='project'){document.getElementById('tab').innerHTML=tabContent()}bind();window.scrollTo(0,0)}
function go(r){route=r;location.hash=r;render()}function bind(){document.querySelectorAll('[data-route]').forEach(x=>x.onclick=()=>go(x.dataset.route));document.querySelectorAll('[data-tab]').forEach(x=>x.onclick=()=>{projectTab=x.dataset.tab;render()});document.querySelectorAll('[data-action]').forEach(x=>x.onclick=()=>act(x.dataset.action));document.querySelectorAll('.x').forEach(x=>x.onclick=e=>{e.preventDefault();x.parentElement.remove()})}
function toast(t){const x=document.getElementById('toast');x.textContent=t;x.classList.add('on');clearTimeout(toast.t);toast.t=setTimeout(()=>x.classList.remove('on'),2400)}
function modal(t,b,ok='确认',fn){document.getElementById('modal').innerHTML=`<div class="modal-bg"><section class="modal"><header><h2>${t}</h2></header><div class="modal-body">${b}</div><footer><button class="btn secondary" id="cancel">取消</button><button class="btn primary" id="ok">${ok}</button></footer></section></div>`;document.getElementById('cancel').onclick=close;document.getElementById('ok').onclick=()=>{const r=fn?fn():true;if(r!==false)close()}}function close(){document.getElementById('modal').innerHTML=''}
function feedback(title,done){modal(title,'<textarea id="modal-text" rows="5" placeholder="请填写具体内容"></textarea>','提交',()=>{if(!document.getElementById('modal-text').value.trim()){toast('请填写具体内容');return false}toast(done);return true})}
function add(id,ph){const d=document.createElement('div');d.className='item';d.innerHTML=`<input placeholder="${ph}"><button class="x">×</button>`;document.getElementById(id).appendChild(d);d.querySelector('button').onclick=()=>d.remove();d.querySelector('input').focus()}
function act(a){if(a==='guide')modal('原型说明','<p>本原型验证流程和信息结构，不代表最终视觉设计。</p><ol><li>客户公开页无需登录。</li><li>重点观察商业基线、交付版本和确认后果是否清楚。</li><li>所有数据均为演示数据。</li></ol>','关闭');if(a==='add-scope')add('scope','输入工作范围');if(a==='add-out')add('out','输入非工作范围');if(a==='save')toast('草稿已保存');if(a==='publish-quote')modal('发布报价 V1','<p>发布后形成不可变版本并生成客户链接。</p>','发布',()=>{toast('报价已发布');go('quote-public')});if(a==='comment')feedback('提出问题','问题已提交');if(a==='reject')feedback('拒绝报价','报价已拒绝');if(a==='confirm-quote'){if(!document.getElementById('quote-consent').checked)return toast('请先勾选确认说明');modal('确认报价','<p>确认后报价 V1 成为当前商业基线。</p>','确认',()=>{toast('报价已确认');go('project')})}if(a==='submit-delivery')modal('提交交付 V2','<p>提交后说明和文件不会被覆盖，并发送验收链接。</p>','提交',()=>{toast('交付 V2 已提交');go('acceptance')});if(a==='revision'||a==='accept-reject'){const f=document.getElementById('feedback');if(!f.value.trim())return toast('请先填写具体反馈');modal(a==='revision'?'请求修改':'拒绝验收',`<p>${f.value}</p>`,'提交',()=>{toast('客户反馈已记录');go('project')})}if(a==='approve')modal('通过交付 V2','<p>里程碑完成，并激活设计验收款 NT$24,000。</p>','通过',()=>{toast('验收通过，应收已激活');go('receivables')});if(a==='analyze')toast('已识别：会员积分属于明确非工作范围');if(a==='publish-change')modal('发布变更 CR-001','<p>客户确认前，金额和日期不会改变。</p>','发布',()=>{toast('变更已发布');go('change-public')});if(a==='reject-change')feedback('拒绝变更','变更已拒绝，商业基线未改变');if(a==='confirm-change'){if(!document.getElementById('change-consent').checked)return toast('请先勾选变更确认说明');modal('确认变更','<p>项目总额更新为 NT$150,000，交付日期更新为 2026-07-27。</p>','确认',()=>{toast('变更已确认，基线已更新');go('project')})}if(a==='new-rec')modal('新建应收','<label>名称<input value="补充服务费"></label><br><label>金额<input value="10000"></label><br><label>到期日<input type="date" value="2026-06-30"></label>','创建',()=>toast('应收已创建'));if(a==='payment')modal('记录付款','<label>金额<input value="24000"></label><br><label>日期<input type="date" value="2026-06-06"></label><br><p>仅记录付款，不代表平台实际处理资金。</p>','保存',()=>toast('付款记录已保存'));if(a==='remind')modal('逾期提醒预览','<textarea rows="7">您好，提醒您品牌视觉项目尾款 NT$28,000 已于 2026-05-29 到期。最终交付已通过验收。如已安排付款，请忽略本提醒；如需补充资料，请回复。</textarea>','发送',()=>toast('提醒已发送'))}
document.getElementById('mobile').onclick=()=>document.querySelector('.side').classList.toggle('open');window.onhashchange=()=>{const r=location.hash.slice(1);if(meta[r]){route=r;render()}};const initial=location.hash.slice(1);if(meta[initial])route=initial;render();
</script>
</body>
