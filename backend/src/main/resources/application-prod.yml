# Production profile
spring:
  datasource:
    url: ${MF_DATASOURCE_URL}
    username: ${MF_DATASOURCE_USERNAME}
    password: ${MF_DATASOURCE_PASSWORD}
    hikari:
      maximum-pool-size: ${MF_HIKARI_MAX_POOL_SIZE:20}
      minimum-idle: ${MF_HIKARI_MIN_IDLE:5}
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  flyway:
    enabled: true

  jpa:
    show-sql: false

  mail:
    host: ${SMTP_HOST}
    port: ${SMTP_PORT}
    username: ${SMTP_USERNAME}
    password: ${SMTP_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: when-authorized
      show-components: when-authorized
      probes:
        enabled: true

logging:
  level:
    root: WARN
    com.milestoneflow: INFO
    org.flywaydb: INFO

milestoneflow:
  mail:
    provider: smtp
    from: "${MILESTONEFLOW_MAIL_FROM}"
    frontend-base-url: "${MILESTONEFLOW_FRONTEND_BASE_URL}"
    verification-path: "/auth/verify-email"
    password-reset-path: "/auth/reset-password"
    sender-name: "MilestoneFlow"
  auth:
    cookies:
      secure: true
