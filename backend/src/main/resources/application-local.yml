# Local development profile
# Requires a running PostgreSQL 17 instance on localhost:5432
spring:
  datasource:
    url: ${MF_DATASOURCE_URL:jdbc:postgresql://localhost:5432/milestoneflow}
    username: ${MF_DATASOURCE_USERNAME:milestoneflow}
    password: ${MF_DATASOURCE_PASSWORD:milestoneflow}
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2

  flyway:
    enabled: true

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

management:
  endpoints:
    web:
      exposure:
        include: health, info, flyway
  endpoint:
    health:
      show-details: always
      show-components: always

logging:
  level:
    root: INFO
    com.milestoneflow: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.flywaydb: DEBUG

milestoneflow:
  mail:
    provider: noop
  auth:
    cookies:
      secure: false
