spring:
  application:
    name: milestoneflow

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: public
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

server:
  servlet:
    context-path: /api/v1
  forward-headers-strategy: native

management:
  endpoints:
    enabled-by-default: false
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      enabled: true
      show-details: when-authorized
      show-components: when-authorized
    info:
      enabled: true
  info:
    env:
      enabled: true

logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSZ} [%thread] %-5level %logger{36} [req=%X{requestId:-}] - %msg%n"
  level:
    root: INFO
    com.milestoneflow: INFO

milestoneflow:
  auth:
    email-verification:
      token-ttl: PT24H
    access-token-ttl: PT15M
    refresh-token-ttl: P30D
    cookies:
      access-name: MF_ACCESS
      refresh-name: MF_REFRESH
      xsrf-name: XSRF-TOKEN
      access-path: /api/v1
      refresh-path: /api/v1/auth/refresh
      same-site-access: Lax
      same-site-refresh: Strict
      secure: false
